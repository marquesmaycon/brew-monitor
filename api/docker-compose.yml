services:
  postgres:
    image: postgres:16
    container_name: beerferment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: beerferment
      POSTGRES_USER: beerferment
      POSTGRES_PASSWORD: beerferment123
    ports:
      - "5432:5432"
    volumes:
      - beerferment_postgres_data:/var/lib/postgresql/data

volumes:
  beerferment_postgres_data: