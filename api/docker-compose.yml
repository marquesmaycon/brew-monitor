services:
  postgres:
    image: postgres:16
    container_name: brewmonitor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: brewmonitor
      POSTGRES_USER: brewmonitor
      POSTGRES_PASSWORD: brewmonitor123
    ports:
      - "5432:5432"
    volumes:
      - brewmonitor_postgres_data:/var/lib/postgresql/data

volumes:
  brewmonitor_postgres_data: