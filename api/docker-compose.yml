services:
  postgres:
    image: postgres:16
    container_name: arbrain-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arbrain_ferment
      POSTGRES_USER: arbrain
      POSTGRES_PASSWORD: arbrain123
    ports:
      - "5432:5432"
    volumes:
      - arbrain_postgres_data:/var/lib/postgresql/data

volumes:
  arbrain_postgres_data: